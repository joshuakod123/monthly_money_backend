name: Monthly Stock Sync

on:
  schedule:
    # 매월 1일 19:00 UTC에 실행 (한국 시간으로는 매월 2일 새벽 04:00에 해당합니다)
    - cron: '0 19 1 * *'
  workflow_dispatch:  # 수동 실행 버튼 (원할 때 언제든 GitHub 웹에서 버튼으로 실행 가능)

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6시간 (전체 시장 sync는 2-3시간 예상)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run sync script
        run: node sync.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}